<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotiExpress - Hot Rotis at your doorstep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-orange-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🫓</span> RotiExpress
            </h1>
            <button onclick="document.getElementById('status-modal').classList.remove('hidden')" class="text-sm font-medium hover:text-orange-200 transition-colors">
                Track Order
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 mt-6">
        
        <!-- Order Form Section -->
        <div id="order-section" class="bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">
            <div class="bg-orange-500 p-6 text-center text-white">
                <h2 class="text-3xl font-bold mb-2">Pre-Order Rotis</h2>
                <p class="text-orange-100 text-sm">Freshly made, hot & soft. Only ₹10/roti.</p>
                <p class="text-orange-100 text-xs mt-1">Book at least 2 hours in advance!</p>
            </div>
            
            <form id="order-form" class="p-6 space-y-5">
                <!-- Customer Details -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="Ramesh Kumar">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number</label>
                        <input type="tel" id="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="+919876543210">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Address</label>
                        <textarea id="address" required rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="12 MG Road, Thane"></textarea>
                    </div>
                </div>

                <hr class="border-gray-200">

                <!-- Order Details -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (Rotis)</label>
                        <div class="flex items-center gap-3">
                            <button type="button" onclick="updateQty(-1)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">-</button>
                            <input type="number" id="quantity" required min="1" value="5" class="w-20 text-center px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all font-semibold" onchange="calculateTotal()">
                            <button type="button" onclick="updateQty(1)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">+</button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Comments / Instructions (Optional)</label>
                        <textarea id="notes" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="Any special instructions?"></textarea>
                    </div>


                </div>
                
                <div class="bg-gray-50 p-4 rounded-lg flex justify-between items-center border border-gray-200">
                    <span class="font-medium text-gray-700">Total Amount:</span>
                    <span id="total_amount" class="text-2xl font-bold text-orange-600">₹50</span>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-orange-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:bg-orange-700 focus:ring-4 focus:ring-orange-300 transition-all flex justify-center items-center">
                    Place Order
                </button>
            </form>
        </div>

        <!-- Success Section (Hidden initially) -->
        <div id="success-section" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center border border-orange-100">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Order Placed!</h2>
            <p class="text-gray-600 mb-6">Your order code is <span id="success-order-code" class="font-bold text-orange-600"></span></p>
            
            <div id="qr-container" class="hidden flex flex-col items-center justify-center mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                <p class="text-sm font-medium text-gray-700 mb-3">Scan with any UPI app to pay <span id="qr-amount" class="font-bold"></span></p>
                <img id="upi-qr-image" src="" alt="UPI QR Code" class="w-48 h-48 rounded-lg shadow-sm">
            </div>

            <div id="cod-container" class="hidden flex flex-col items-center justify-center mb-6 bg-orange-50 p-4 rounded-xl border border-orange-200">
                <h3 class="text-lg font-bold text-orange-800 mb-1">Cash on Delivery</h3>
                <p class="text-sm font-medium text-orange-700">Please prepare <span id="cod-amount" class="font-bold"></span> to pay upon delivery.</p>
            </div>

            <div id="rzp-container" class="hidden mb-6">
                <!-- If Razorpay is enabled, we could auto-invoke it here -->
            </div>

            <a id="wa-confirm-btn" href="#" target="_blank" class="w-full bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:bg-green-600 transition-all flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 3.825.001 6.938 3.115 6.938 6.938 0 3.825-3.115 6.938-6.938 6.938z"/></svg>
                Confirm on WhatsApp
            </a>
            
            <button onclick="location.reload()" class="mt-4 text-sm text-gray-500 hover:text-orange-600 transition-colors">
                Place another order
            </button>
        </div>

    </main>

    <!-- Track Order Modal -->
    <div id="status-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm relative">
            <button onclick="document.getElementById('status-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 class="text-xl font-bold mb-4">Track Order</h3>
            <div class="flex gap-2 mb-4">
                <input type="text" id="track-code" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" placeholder="RE-2026...">
                <button onclick="trackOrder()" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-orange-700">Track</button>
            </div>
            <div id="track-result" class="text-sm"></div>
        </div>
    </div>

    <!-- Configuration block to dynamically set base URL based on environment -->
    <script>
        const API_BASE = "/api";
        const PRICE_PER_ROTI = 10;
        
        // Initialize constraints (no longer needed for date picker, but keeping structure)
        const dateInput = document.getElementById('delivery_date');

        function updateQty(change) {
            const input = document.getElementById('quantity');
            let val = parseInt(input.value) + change;
            if(val < 1) val = 1;
            input.value = val;
            calculateTotal();
        }

        function calculateTotal() {
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            document.getElementById('total_amount').innerText = `₹${qty * PRICE_PER_ROTI}`;
        }



        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

            const payload = {
                customer: {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                },
                quantity: parseInt(document.getElementById('quantity').value),
                payment_method: 'COD',
                notes: document.getElementById('notes').value
            };

            try {
                const res = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    document.getElementById('order-section').classList.add('hidden');
                    document.getElementById('success-section').classList.remove('hidden');
                    
                    document.getElementById('success-order-code').innerText = data.order_code;
                    
                    if (data.payment_method === 'UPI' && data.qr_code_base64) {
                        document.getElementById('qr-container').classList.remove('hidden');
                        document.getElementById('upi-qr-image').src = data.qr_code_base64;
                        document.getElementById('qr-amount').innerText = `₹${data.total_amount}`;
                    } else if (data.payment_method === 'COD') {
                        document.getElementById('cod-container').classList.remove('hidden');
                        document.getElementById('cod-amount').innerText = `₹${data.total_amount}`;
                    }

                    // Setup WA Confirm button
                    const waNum = "919000000000"; // Replace with actual business number
                    const waText = encodeURIComponent(`Confirm order ${data.order_code}`);
                    document.getElementById('wa-confirm-btn').href = `https://wa.me/${waNum}?text=${waText}`;

                } else {
                    alert(data.detail || "Error placing order");
                    btn.disabled = false;
                    btn.innerText = 'Place Order';
                }
            } catch(e) {
                console.error(e);
                alert("Network error. Please try again.");
                btn.disabled = false;
                btn.innerText = 'Place Order';
            }
        });

        async function trackOrder() {
            const code = document.getElementById('track-code').value.trim();
            if(!code) return;
            
            const resDiv = document.getElementById('track-result');
            resDiv.innerHTML = '<span class="text-gray-500">Searching...</span>';
            
            try {
                const res = await fetch(`${API_BASE}/orders/${code}`);
                if(res.ok) {
                    const data = await res.json();
                    resDiv.innerHTML = `
                        <div class="mt-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
                            <p><strong>Status:</strong> <span class="text-orange-600">${data.order_status}</span></p>
                            <p><strong>Payment:</strong> ${data.payment_status}</p>
                            <p><strong>Rotis:</strong> ${data.quantity}</p>
                        </div>
                    `;
                } else {
                    resDiv.innerHTML = '<span class="text-red-500">Order not found.</span>';
                }
            } catch(e) {
                resDiv.innerHTML = '<span class="text-red-500">Network error.</span>';
            }
        }
    </script>
</body>
</html>
