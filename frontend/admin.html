<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotiExpress - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
    
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-orange-600 text-white font-bold py-2 rounded-lg hover:bg-orange-700 transition">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden">
        <nav class="bg-gray-900 text-white p-4 shadow-md sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span>⚙️</span> RotiExpress Admin
                </h1>
                <button onclick="logout()" class="text-sm font-medium hover:text-gray-300">Logout</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-4 py-8">
            
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-container">
                <!-- Injected via JS -->
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-6">
                <button onclick="switchTab('ONGOING')" id="tab-ongoing" class="px-6 py-3 font-medium text-orange-600 border-b-2 border-orange-600">Ongoing Orders</button>
                <button onclick="switchTab('COMPLETED')" id="tab-completed" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700">Completed Orders</button>
            </div>

            <!-- Orders Table -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 border-b">
                                <th class="p-4 font-medium text-sm">Order Code</th>
                                <th class="p-4 font-medium text-sm">Customer</th>
                                <th class="p-4 font-medium text-sm">Slot & Address</th>
                                <th class="p-4 font-medium text-sm">Amount</th>
                                <th class="p-4 font-medium text-sm">Payment</th>
                                <th class="p-4 font-medium text-sm">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody" class="divide-y divide-gray-200">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Paid Modal -->
    <div id="paid-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">Confirm Payment</h3>
            <p class="mb-6 text-gray-600">Are you sure you want to mark order <span id="paid-order-code" class="font-bold text-gray-800"></span> as PAID?</p>
            <div class="flex justify-end gap-2">
                <button onclick="closePaidModal()" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg">Cancel</button>
                <button onclick="confirmPaid()" class="px-4 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700">Mark Paid</button>
            </div>
        </div>
    </div>

    <!-- Complete Modal -->
    <div id="complete-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">Complete Order</h3>
            <p class="mb-6 text-gray-600">Are you sure you want to mark order <span id="complete-order-code" class="font-bold text-gray-800"></span> as COMPLETED?</p>
            <div class="flex justify-end gap-2">
                <button onclick="closeCompleteModal()" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg">Cancel</button>
                <button onclick="confirmComplete()" class="px-4 py-2 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700">Complete</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "/api/admin";
        let token = localStorage.getItem('admin_token');
        let currentTab = 'ONGOING';

        if(token) {
            showDashboard();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if(res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('admin_token', token);
                    showDashboard();
                } else {
                    alert("Invalid credentials");
                }
            } catch(e) {
                alert("Network error");
            }
        });

        function logout() {
            localStorage.removeItem('admin_token');
            token = null;
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            fetchStats();
            fetchOrders();
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if(res.status === 401) { logout(); return; }
                const data = await res.json();
                
                const statsHtml = `
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-orange-500">
                        <p class="text-sm text-gray-500 font-medium">Ongoing Orders</p>
                        <p class="text-2xl font-bold">${data.ongoing_orders}</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
                        <p class="text-sm text-gray-500 font-medium">Completed Today</p>
                        <p class="text-2xl font-bold">${data.orders_today}</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-500">
                        <p class="text-sm text-gray-500 font-medium">Revenue Today</p>
                        <p class="text-2xl font-bold">₹${data.revenue_today}</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-purple-500">
                        <p class="text-sm text-gray-500 font-medium">All Time Revenue</p>
                        <p class="text-2xl font-bold">₹${data.total_revenue_all_time}</p>
                    </div>
                `;
                document.getElementById('stats-container').innerHTML = statsHtml;
            } catch(e) { console.error(e); }
        }

        function switchTab(tab) {
            currentTab = tab;
            if(tab === 'ONGOING') {
                document.getElementById('tab-ongoing').className = "px-6 py-3 font-medium text-orange-600 border-b-2 border-orange-600";
                document.getElementById('tab-completed').className = "px-6 py-3 font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent";
            } else {
                document.getElementById('tab-completed').className = "px-6 py-3 font-medium text-orange-600 border-b-2 border-orange-600";
                document.getElementById('tab-ongoing').className = "px-6 py-3 font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent";
            }
            fetchOrders();
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_BASE}/orders?status=${currentTab}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if(res.status === 401) { logout(); return; }
                const orders = await res.json();
                
                let html = '';
                if(orders.length === 0) {
                    html = `<tr><td colspan="6" class="p-8 text-center text-gray-500">No orders found.</td></tr>`;
                } else {
                    orders.forEach(o => {
                        const d = new Date(o.delivery_slot);
                        const slotTime = d.toLocaleString();
                        
                        let paymentBadge = '';
                        if(o.payment_status === 'PAID') {
                            paymentBadge = `<span class="bg-green-100 text-green-800 text-xs font-semibold px-2 py-1 rounded">PAID</span>`;
                        } else {
                            paymentBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2 py-1 rounded">PENDING</span>`;
                        }

                        let actions = '';
                        if(currentTab === 'ONGOING') {
                            actions += `<button onclick="markComplete('${o.order_code}')" class="text-white bg-orange-600 hover:bg-orange-700 px-3 py-1 rounded text-sm font-medium mr-2">Complete</button>`;
                            if(o.payment_status !== 'PAID') {
                                actions += `<button onclick="markPaid('${o.order_code}')" class="text-white bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm font-medium">Mark Paid</button>`;
                            }
                        }

                        html += `
                            <tr class="hover:bg-gray-50">
                                <td class="p-4"><span class="font-bold text-sm">${o.order_code}</span><br><span class="text-xs text-gray-500">${o.quantity} Rotis</span></td>
                                <td class="p-4 text-sm font-medium">${o.customer.name}<br><span class="text-xs text-gray-500">${o.customer.phone}</span></td>
                                <td class="p-4 text-sm">${slotTime}<br><span class="text-xs text-gray-500 truncate max-w-xs block">${o.customer.address}</span></td>
                                <td class="p-4 font-bold text-gray-700">₹${o.total_amount}</td>
                                <td class="p-4">${o.payment_method}<br>${paymentBadge}</td>
                                <td class="p-4">${actions}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('orders-tbody').innerHTML = html;
            } catch(e) { console.error(e); }
        }

        let selectedOrderForPaid = null;
        let selectedOrderForComplete = null;

        function markPaid(code) {
            selectedOrderForPaid = code;
            document.getElementById('paid-order-code').innerText = code;
            document.getElementById('paid-modal').classList.remove('hidden');
        }

        function closePaidModal() {
            document.getElementById('paid-modal').classList.add('hidden');
            selectedOrderForPaid = null;
        }

        async function confirmPaid() {
            if(!selectedOrderForPaid) return;
            try {
                await fetch(`${API_BASE}/orders/${selectedOrderForPaid}/payment`, {
                    method: 'PATCH',
                    headers: {'Authorization': `Bearer ${token}`}
                });
                closePaidModal();
                fetchOrders();
                fetchStats();
            } catch(e) { console.error(e); }
        }

        function markComplete(code) {
            selectedOrderForComplete = code;
            document.getElementById('complete-order-code').innerText = code;
            document.getElementById('complete-modal').classList.remove('hidden');
        }

        function closeCompleteModal() {
            document.getElementById('complete-modal').classList.add('hidden');
            selectedOrderForComplete = null;
        }

        async function confirmComplete() {
            if(!selectedOrderForComplete) return;

            try {
                const res = await fetch(`${API_BASE}/orders/${selectedOrderForComplete}/complete`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if(res.ok) {
                    closeCompleteModal();
                    fetchOrders();
                    fetchStats();
                } else {
                    alert("Failed to complete order");
                }
            } catch(e) {
                console.error(e);
                alert("Network error");
            }
        }
    </script>
</body>
</html>
